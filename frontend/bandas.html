<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estoque de Bandas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <span class="navbar-brand">
            Controle de Bandas
        </span>

        <div>

            <!-- 🔥 DASHBOARD AMARELO -->
            <a href="dashboard.html" class="btn btn-sm btn-warning">
                Dashboard
            </a>

            <button onclick="logout()" class="btn btn-sm btn-danger">
                Sair
            </button>

        </div>

    </div>

</nav>

<div class="container mt-4">

    <!-- SOMENTE ADMIN -->
    <div id="formCadastroBandas" class="card p-3 mb-4">

        <h5 class="mb-3">
            Nova Banda
        </h5>

        <div class="row g-2">

            <div class="col-12 col-md-3">
                <input id="codigo" class="form-control" placeholder="Código">
            </div>

            <div class="col-12 col-md-3">
                <input id="descricao" class="form-control" placeholder="Descrição">
            </div>

            <div class="col-6 col-md-2">
                <input id="estoque_total" class="form-control" placeholder="Estoque">
            </div>

            <div class="col-6 col-md-2">
                <input id="estoque_minimo" class="form-control" placeholder="Mínimo">
            </div>

            <div class="col-12 col-md-2">
                <button onclick="salvarBanda()" class="btn btn-primary w-100">
                    Salvar
                </button>
            </div>

        </div>

    </div>

    <div class="card p-3">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h5 class="mb-0">
                Estoque de Bandas
            </h5>

            <span class="badge bg-secondary">
                Consulta de Estoque
            </span>

        </div>

        <div class="mb-3">
            <input
                type="text"
                id="filtroBanda"
                class="form-control"
                placeholder="Buscar por código ou descrição..."
                onkeyup="filtrarBandas()"
            >
        </div>

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead>

                    <tr>

                        <th>Código</th>
                        <th>Descrição</th>
                        <th>Estoque</th>
                        <th>Estoque Mínimo</th>
                        <th>Status</th>
                        <th width="180">
                            Ações
                        </th>

                    </tr>

                </thead>

                <tbody id="tabelaBandas">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="js/permissoes.js"></script>
<script src="js/config.js"></script>
<script src="js/bandas.js"></script>

</body>
</html>
