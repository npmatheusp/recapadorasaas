<!DOCTYPE html>

<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
    background:#f5f7fb;
}

.navbar{
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    transition:.2s;
}

.card:hover{
    transform:translateY(-3px);
}

.card-title{
    color:#6c757d;
    font-size:14px;
    text-transform:uppercase;
    margin-bottom:10px;
}

.card-value{
    font-size:36px;
    font-weight:bold;
    color:#212529;
}

.page-title{
    font-weight:bold;
    margin-bottom:25px;
}

.table-card{
    background:#fff;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    padding:20px;
    height:100%;
}

@media (max-width:768px){

    .navbar .container-fluid{
        flex-direction:column;
        gap:10px;
    }

    .navbar .btn{
        width:100%;
    }

    .card-value{
        font-size:28px;
    }

    .page-title{
        text-align:center;
    }
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">


    <span class="navbar-brand">
        Sistema de Recapadora
    </span>

    <div class="d-flex flex-wrap gap-2">

        <a href="dashboard.html" class="btn btn-warning">
            Dashboard
        </a>

        <a href="bandas.html" id="menuBandas" class="btn btn-outline-light">
            Estoque
        </a>

        <a href="producao.html" id="menuProducao" class="btn btn-outline-light">
            Produção
        </a>

        <button onclick="logout()" class="btn btn-danger">
            Sair
        </button>

    </div>

</div>


</nav>

<div class="container mt-4">


<h2 class="page-title">
    Dashboard
</h2>

<div class="row g-4">

    <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <div class="card-title">Total em Estoque</div>
                <div class="card-value" id="totalEstoque">0</div>
            </div>
        </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <div class="card-title">Produções Hoje</div>
                <div class="card-value" id="producoesHoje">0</div>
            </div>
        </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <div class="card-title">Produções no Mês</div>
                <div class="card-value" id="producoesMes">0</div>
            </div>
        </div>
    </div>

</div>

<div class="row mt-5">

    <div class="col-12">

        <div class="table-card">

            <h5>Últimas Produções</h5>

            <table class="table table-striped table-hover">

                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Código</th>
                        <th>Descrição</th>
                        <th>Quantidade</th>
                    </tr>
                </thead>

                <tbody id="ultimasProducoes">

                    <tr>
                        <td colspan="4" class="text-center">
                            Nenhum registro encontrado
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>


</div>

<script>

const perfil = localStorage.getItem('perfil');

if (perfil === 'VENDEDOR') {

    const producao =
        document.getElementById('menuProducao');

    if (producao)
        producao.style.display = 'none';
}

if (perfil === 'PRODUCAO') {

    const bandas =
        document.getElementById('menuBandas');

    if (bandas)
        bandas.style.display = 'none';
}

function logout(){

    localStorage.removeItem('token');
    localStorage.removeItem('usuario');
    localStorage.removeItem('perfil');

    window.location.href = 'login.html';
}

</script>

<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
