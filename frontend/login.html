<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <title>Recapadora SaaS</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card">

                <div class="card-header">
                    Login
                </div>

                <div class="card-body">

                    <input
                        type="text"
                        id="usuario"
                        class="form-control mb-3"
                        placeholder="Usuário">

                    <input
                        type="password"
                        id="senha"
                        class="form-control mb-3"
                        placeholder="Senha">

                    <button
                        class="btn btn-primary w-100"
                        onclick="login()">

                        Entrar

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="js/auth.js"></script>
<script src="js/config.js"></script>

</body>
</html>
