<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">

    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <span class="navbar-brand">Reservas</span>

        <div class="d-flex gap-2 flex-wrap">

            <a href="dashboard.html" class="btn btn-sm btn-outline-light">
                Dashboard
            </a>

            <button onclick="logout()" class="btn btn-sm btn-danger">
                Sair
            </button>

        </div>

    </div>
</nav>

<div class="container mt-4">

    <div class="card p-3 mb-4">

        <h5 class="mb-3">Nova Reserva</h5>

        <div class="row g-2">

            <div class="col-12 col-md-4">
                <input
                    type="text"
                    id="cliente"
                    class="form-control"
                    placeholder="Cliente">
            </div>

            <div class="col-12 col-md-4">
                <select id="banda" class="form-select">
                    <option value="">Selecione uma banda...</option>
                </select>
            </div>

            <!-- ✅ ALTERAÇÃO: campo quantidade mantido e ajustado -->
            <div class="col-6 col-md-2">
                <input
                    type="number"
                    id="quantidade"
                    class="form-control"
                    placeholder="Qtd"
                    min="1"
                    value="1">
            </div>

            <div class="col-6 col-md-2">
                <button
                    class="btn btn-success w-100"
                    onclick="criarReserva()">
                    Reservar
                </button>
            </div>

        </div>

    </div>

    <div class="card p-3">

        <h5 class="mb-3">Reservas</h5>

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Status</th>
                        <th width="180">Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaReservas"></tbody>

            </table>

        </div>

    </div>

</div>

<!-- JQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Select2 -->
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("perfil");
    localStorage.removeItem("nome");

    window.location.href = "login.html";
}
</script>

<script src="js/config.js"></script>
<script src="js/reservas.js"></script>

</body>
</html>
