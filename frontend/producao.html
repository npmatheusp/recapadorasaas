<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produção</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
}

.card{
    border:none;
    border-radius:15px;
}

.card-header{
    border-radius:15px 15px 0 0 !important;
}

#resultadoBandas{
    position:absolute;
    width:100%;
    z-index:9999;
    max-height:300px;
    overflow-y:auto;
    background:#fff;
    border:1px solid #dee2e6;
    border-radius:10px;
    display:none;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

#resultadoBandas .item-banda{
    padding:12px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

#resultadoBandas .item-banda:last-child{
    border-bottom:none;
}

#resultadoBandas .item-banda:hover{
    background:#f8f9fa;
}

.banda-codigo{
    font-weight:bold;
    color:#0d6efd;
}

.banda-estoque{
    font-size:12px;
}

@media (max-width:768px){

    .container{
        padding-left:10px;
        padding-right:10px;
    }

    h2{
        font-size:22px;
    }

    .btn{
        font-size:14px;
    }

    #resultadoBandas{
        max-height:250px;
    }
}

</style>

</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Produção</h2>

        <div>

            <a href="dashboard.html" class="btn btn-warning me-2">
                Dashboard
            </a>

            <button onclick="sairSistema()" class="btn btn-danger">
                Sair
            </button>

        </div>

    </div>

    <div class="card shadow-sm mb-4">

        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Registrar Produção</h5>
        </div>

        <div class="card-body">

            <form id="formProducao">

                <div class="mb-3 position-relative">

                    <label class="form-label">
                        Banda
                    </label>

                    <input
                        type="text"
                        id="bandaBusca"
                        class="form-control"
                        placeholder="Digite código ou descrição..."
                        autocomplete="off"
                        required
                    >

                    <input
                        type="hidden"
                        id="banda"
                    >

                    <div id="resultadoBandas"></div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Quantidade Utilizada
                    </label>

                    <input
                        type="number"
                        id="quantidade"
                        class="form-control"
                        min="1"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Observação
                    </label>

                    <textarea
                        id="observacao"
                        class="form-control"
                        rows="3"></textarea>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100">

                    Registrar Produção

                </button>

            </form>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Histórico de Produção</h5>
        </div>

        <div class="card-body p-0">

            <div class="table-responsive">

                <table class="table table-striped table-hover mb-0">

                    <thead class="table-light">

                        <tr>
                            <th>Data</th>
                            <th>Código</th>
                            <th>Descrição</th>
                            <th>Quantidade</th>
                            <th>Observação</th>
                        </tr>

                    </thead>

                    <tbody id="tabelaHistorico">

                        <tr>
                            <td colspan="5" class="text-center">
                                Nenhum registro encontrado
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="js/producao.js"></script>
<script src="js/config.js"></script>

</body>
</html>
